version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: neo-postgres
    environment:
      POSTGRES_USER: neo
      POSTGRES_PASSWORD: neo_secret
      POSTGRES_DB: neo_domotique
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neo -d neo_domotique"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: neo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: neo_minio
      MINIO_ROOT_PASSWORD: neo_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  whisper:
    image: fedirz/faster-whisper-server:latest
    container_name: neo-whisper
    ports:
      - "8000:8000"
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-medium
      - WHISPER__DEVICE=cpu
    volumes:
      - whisper_models:/root/.cache/huggingface
    restart: unless-stopped

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set neo http://minio:9000 neo_minio neo_minio_secret;
      mc mb neo/neo-photos --ignore-existing;
      mc mb neo/neo-documents --ignore-existing;
      mc anonymous set download neo/neo-photos;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
  whisper_models:
